about_title: Über uns
about_heading: Seriöses Coaching, entspannte Inselenergie.
about_text: Kite Away Sardinia verbindet zertifizierten Unterricht mit lokaler Erfahrung und einem warmen, praktischen Ansatz. Du bekommst klares Feedback, hochwertige Ausrüstung und Raum zum Lernen ohne Druck.
