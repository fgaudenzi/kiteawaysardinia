faq_title: FAQ
faq_heading: Gut zu wissen vor dem Kurs.
faq_1_q: Was, wenn ich keine Erfahrung habe?
faq_1_a: Kein Problem. Anfängerkurse starten mit Sicherheit, Kitekontrolle und einfachen Wasserübungen, bevor es aufs Board geht.
faq_3_q: Ist die Ausrüstung inklusive?
faq_3_a: Ja. Kite, Board, Trapez, Helm, Impact Vest und Sicherheitsausrüstung sind in jeder Lektion enthalten.
faq_wind_q: Was passiert, wenn kein Wind ist?
faq_wind_a: Wir planen auf sichere und sinnvolle Bedingungen um. Ziel ist ein guter Kurs, nicht ein schlechter Tag um jeden Preis.
contact_title: Bereit, deine Session zu planen?
contact_text: Schreib uns deine Daten, dein Level und die Gruppengröße. Wir schlagen das beste Format und Windfenster vor.
