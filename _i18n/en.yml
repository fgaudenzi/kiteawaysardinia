about_title: About
about_heading: Serious coaching, relaxed island energy.
about_text: Kite Away Sardinia combines certified instruction with local knowledge and a warm, practical approach. You get clear feedback, quality equipment, and the space to learn without pressure.
included_title: What is included
included_text: Board, kite, harness, helmet, impact vest, safety systems, spot briefing, and lesson planning around the wind forecast.
