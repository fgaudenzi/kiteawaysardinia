faq_title: FAQ
faq_heading: Good to know before you ride.
faq_1_q: What if I have no experience?
faq_1_a: No problem. Beginner lessons start with safety, kite control, and simple water exercises before progressing to the board.
faq_3_q: Is equipment included?
faq_3_a: Yes. Kite, board, harness, helmet, impact vest, and safety gear are included in every lesson.
faq_wind_q: What happens if there is no wind?
faq_wind_a: We reschedule around safe and useful wind conditions. The goal is a good lesson, not forcing a bad one.
contact_title: Ready to plan your session?
contact_text: Send a message with your dates, level, and group size. We will suggest the best lesson format and wind window.
