spot_title: The spot
spot_heading: Flat water, thermal wind, Sardinian light.
spot_text: Our teaching area is selected for forgiving water, clear wind direction, and easy progression. Every session is planned around the day's conditions, your level, and the safest learning window.
spot_point_1: Reliable summer thermal winds
spot_point_2: Beginner-friendly water conditions
spot_point_3: Safety briefing and radio support
