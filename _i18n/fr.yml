spot_title: Le spot
spot_heading: Eau plate, vent thermique, lumière sarde.
spot_text: Notre zone d'enseignement est choisie pour son eau accessible, sa direction de vent claire et sa progression facile. Chaque session est planifiée selon les conditions du jour, votre niveau et la fenêtre la plus sûre.
spot_point_1: Vents thermiques d'été fiables
spot_point_2: Conditions adaptées aux débutants
spot_point_3: Briefing sécurité et support radio
