about_title: À propos
about_heading: Coaching sérieux, énergie insulaire détendue.
about_text: Kite Away Sardinia associe instruction certifiée, connaissance locale et approche pratique et chaleureuse. Vous recevez des retours clairs, du matériel de qualité et l'espace pour apprendre sans pression.
included_title: Ce qui est inclus
included_text: Planche, aile, harnais, casque, gilet d'impact, systèmes de sécurité, briefing du spot et planification selon le vent.
