faq_title: FAQ
faq_heading: Bon à savoir avant de rider.
faq_1_q: Et si je n'ai aucune expérience ?
faq_1_a: Aucun problème. Les cours débutants commencent par la sécurité, le contrôle de l'aile et des exercices simples dans l'eau avant la planche.
faq_3_q: Le matériel est-il inclus ?
faq_3_a: Oui. Aile, planche, harnais, casque, gilet d'impact et équipement de sécurité sont inclus dans chaque cours.
faq_wind_q: Que se passe-t-il s'il n'y a pas de vent ?
faq_wind_a: Nous reprogrammons selon des conditions sûres et utiles. L'objectif est un bon cours, pas de forcer une mauvaise journée.
contact_title: Prêt à planifier votre session ?
contact_text: Envoyez-nous vos dates, votre niveau et la taille du groupe. Nous proposerons le meilleur format et la meilleure fenêtre de vent.
