faq_title: FAQ
faq_heading: Da sapere prima di entrare in acqua.
faq_1_q: E se non ho esperienza?
faq_1_a: Nessun problema. Le lezioni beginner iniziano con sicurezza, controllo del kite e semplici esercizi in acqua prima di passare alla tavola.
faq_3_q: L'attrezzatura è inclusa?
faq_3_a: Sì. Kite, tavola, trapezio, casco, impact vest e dispositivi di sicurezza sono inclusi in ogni lezione.
faq_wind_q: Cosa succede se non c'è vento?
faq_wind_a: Ripianifichiamo in base a condizioni sicure e utili. L'obiettivo è una buona lezione, non forzare una giornata sbagliata.
contact_title: Pronto a pianificare la tua sessione?
contact_text: Scrivici date, livello e numero di persone. Ti suggeriremo il formato migliore e la finestra di vento più adatta.
contact_email: Scrivici via email
