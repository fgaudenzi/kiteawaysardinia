about_title: Chi siamo
about_heading: Coaching serio, energia rilassata da isola.
about_text: Kite Away Sardinia unisce istruzione certificata, conoscenza locale e un approccio pratico e accogliente. Ricevi feedback chiari, attrezzatura di qualità e lo spazio per imparare senza pressione.
included_title: Cosa è incluso
included_text: Tavola, kite, trapezio, casco, impact vest, sistemi di sicurezza, briefing dello spot e pianificazione della lezione in base al vento.
