lessons_title: Lezioni
lessons_heading: Scegli il percorso adatto al tuo livello.
lessons_intro: Parti da zero, progredisci con un pacchetto mirato o migliora la tecnica avanzata con una sessione costruita sui tuoi obiettivi.
lesson_1_tag: Principiante
lesson_1_title: Battesimo del Mare
lesson_1_desc: Impara controllo del kite, basi di sicurezza, finestra del vento e primi movimenti in acqua con un approccio calmo e progressivo.
lesson_1_duration: 2 ore
lesson_1_price: da €60
lesson_1_image_alt: Kitesurfer sull'acqua blu
lesson_2_tag: Progressione
lesson_2_title: Pacchetto 6 Ore
lesson_2_desc: Un percorso completo per costruire autonomia, partenze dall'acqua, controllo della tavola e sicurezza in condizioni reali.
lesson_2_duration: 6 ore
lesson_2_price: da €150
lesson_2_image_alt: Attrezzatura da kitesurf sulla spiaggia
