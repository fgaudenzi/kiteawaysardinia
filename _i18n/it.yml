spot_title: Lo spot
spot_heading: Acqua piatta, vento termico, luce sarda.
spot_text: La nostra area didattica è scelta per acqua permissiva, direzione del vento chiara e progressione semplice. Ogni sessione è pianificata sulle condizioni del giorno, sul tuo livello e sulla finestra più sicura.
spot_point_1: Venti termici estivi affidabili
spot_point_2: Condizioni adatte ai principianti
spot_point_3: Briefing sicurezza e supporto radio
