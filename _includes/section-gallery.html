<section class="section section--gallery" aria-labelledby="gallery-title">
  <div class="container section__heading"><p class="eyebrow">{% t gallery_title %}</p><h2 id="gallery-title">{% t gallery_heading %}</h2></div>
  <div class="container gallery-grid">
    <img src="{{ '/assets/images/gallery/01.jpg' | relative_url }}" alt="{% t gallery_alt_1 %}" width="700" height="520" loading="lazy">
    <img src="{{ '/assets/images/gallery/02.jpg' | relative_url }}" alt="{% t gallery_alt_2 %}" width="700" height="520" loading="lazy">
    <img src="{{ '/assets/images/gallery/03.jpg' | relative_url }}" alt="{% t gallery_alt_3 %}" width="700" height="520" loading="lazy">
    <img src="{{ '/assets/images/gallery/04.jpg' | relative_url }}" alt="{% t gallery_alt_4 %}" width="700" height="520" loading="lazy">
  </div>
</section>
