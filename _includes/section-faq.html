<section class="section" id="faq" aria-labelledby="faq-title">
  <div class="container faq-layout">
    <div class="section__heading section__heading--left"><p class="eyebrow">{% t faq_title %}</p><h2 id="faq-title">{% t faq_heading %}</h2></div>
    <div class="faq-list">
      <details open><summary>{% t faq_1_q %}</summary><p>{% t faq_1_a %}</p></details>
      <details><summary>{% t faq_3_q %}</summary><p>{% t faq_3_a %}</p></details>
      <details><summary>{% t faq_wind_q %}</summary><p>{% t faq_wind_a %}</p></details>
    </div>
  </div>
</section>
