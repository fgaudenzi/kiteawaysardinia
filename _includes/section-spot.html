<section class="section section--spot" id="spot" aria-labelledby="spot-title">
  <div class="container split">
    <div>
      <p class="eyebrow">{% t spot_title %}</p>
      <h2 id="spot-title">{% t spot_heading %}</h2>
      <p>{% t spot_text %}</p>
      <ul class="check-list">
        <li>{% t spot_point_1 %}</li>
        <li>{% t spot_point_2 %}</li>
        <li>{% t spot_point_3 %}</li>
      </ul>
    </div>
    <figure class="feature-image"><img src="{{ '/assets/images/punta-trettu.jpg' | relative_url }}" alt="{% t spot_image_alt %}" width="960" height="720" loading="lazy"></figure>
  </div>
</section>
